name: Build ISO

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  BUILDROOT_VERSION: "2024.11"

jobs:
  build-iso:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout w3cos
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - name: Cache Rust
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build w3cos-shell for Linux x86_64
        run: |
          cargo build --release -p w3cos-shell --target x86_64-unknown-linux-gnu
          cargo build --release -p w3cos-cli --target x86_64-unknown-linux-gnu
          ls -lh target/x86_64-unknown-linux-gnu/release/w3cos-shell
          ls -lh target/x86_64-unknown-linux-gnu/release/w3cos
          strip target/x86_64-unknown-linux-gnu/release/w3cos-shell
          strip target/x86_64-unknown-linux-gnu/release/w3cos

      - name: Install Buildroot dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libncurses5-dev bc cpio \
            unzip rsync wget file syslinux syslinux-utils xorriso

      - name: Cache Buildroot
        uses: actions/cache@v4
        with:
          path: buildroot-${{ env.BUILDROOT_VERSION }}
          key: buildroot-${{ env.BUILDROOT_VERSION }}-v2

      - name: Download Buildroot
        run: |
          if [ ! -d "buildroot-${BUILDROOT_VERSION}" ]; then
            wget -q "https://buildroot.org/downloads/buildroot-${BUILDROOT_VERSION}.tar.gz"
            tar xf "buildroot-${BUILDROOT_VERSION}.tar.gz"
          fi

      - name: Configure and build ISO
        run: |
          cd "buildroot-${BUILDROOT_VERSION}"
          export W3COS_SHELL_BIN="${GITHUB_WORKSPACE}/target/x86_64-unknown-linux-gnu/release/w3cos-shell"
          export W3COS_CLI_BIN="${GITHUB_WORKSPACE}/target/x86_64-unknown-linux-gnu/release/w3cos"
          make BR2_EXTERNAL="${GITHUB_WORKSPACE}/system/buildroot" w3cos_x86_64_defconfig
          make -j$(nproc)

      - name: Upload ISO artifact
        uses: actions/upload-artifact@v4
        with:
          name: w3cos-iso
          path: buildroot-${{ env.BUILDROOT_VERSION }}/output/images/*.iso

      - name: Create Release (on tag push)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: buildroot-${{ env.BUILDROOT_VERSION }}/output/images/*.iso
          body: |
            ## W3C OS ${{ github.ref_name }}

            Bootable ISO image. Run with QEMU:
            ```bash
            qemu-system-x86_64 -cdrom w3cos-*.iso -m 2G -vga virtio
            ```

            Or flash to USB:
            ```bash
            sudo dd if=w3cos-*.iso of=/dev/sdX bs=4M status=progress
            ```
